<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - ECOLE LA FONTAINE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            text-align: center;
            max-width: 400px;
        }

        .offline-icon {
            font-size: 80px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #f59e0b;
        }

        p {
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .retry-btn {
            background: #10b981;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You are offline</h1>
        <p>Please check your internet connection.<br>Marks entered will be saved locally and synced when you're back
            online.</p>
        <button class="btn" onclick="location.reload()">🔄 Try Again</button>
        <br>
        <button class="btn retry-btn" onclick="window.location.href='/'">🏠 Go to Home</button>
    </div>
    <script>
        // Listen for online event
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>

</html>
