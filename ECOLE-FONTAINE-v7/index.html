<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ECOLE LA FONTAINE - Complete School Management System">
    <meta name="theme-color" content="#1a3a5c">
    <title>ECOLE LA FONTAINE — School Management System</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS Core -->
    <link rel="stylesheet" href="css/core/variables.css">
    <link rel="stylesheet" href="css/core/reset.css">
    <link rel="stylesheet" href="css/core/typography.css">
    <link rel="stylesheet" href="css/core/layout.css">
    <link rel="stylesheet" href="css/core/animations.css">
    <link rel="stylesheet" href="css/core/utilities.css">
    <link rel="stylesheet" href="css/core/themes.css">

    <!-- CSS Components -->
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/topbar.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/tables.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/badges.css">
    <link rel="stylesheet" href="css/components/dropdowns.css">
    <link rel="stylesheet" href="css/components/tabs.css">
    <link rel="stylesheet" href="css/components/pagination.css">
    <link rel="stylesheet" href="css/components/alerts.css">
    <link rel="stylesheet" href="css/components/toasts.css">
    <link rel="stylesheet" href="css/components/modals.css">
    <link rel="stylesheet" href="css/components/charts.css">
    <link rel="stylesheet" href="css/components/loaders.css">

    <!-- CSS Pages -->
    <link rel="stylesheet" href="css/pages/login.css">
    <link rel="stylesheet" href="css/pages/dashboard.css">

    <!-- CSS Mobile -->
    <link rel="stylesheet" href="css/mobile/mobile.css">
    <link rel="stylesheet" href="css/mobile/tablet.css">
    <link rel="stylesheet" href="css/mobile/responsive-sidebar.css">

    <!-- CSS Print (only applied when printing) -->
    <link rel="stylesheet" href="css/print/reports-print.css" media="print">
    <link rel="stylesheet" href="css/print/receipts-print.css" media="print">

    <!-- PWA manifest (will be overridden dynamically by pwa.js after school settings load) -->
    <link rel="manifest" href="pwa/manifest.json">
    <link rel="apple-touch-icon" href="assets/logos/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/logos/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/logos/favicon-16x16.png">

    <!-- External libraries (loaded sync so modules can use them as globals) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <!-- Toast & Modal containers (always present in DOM) -->
    <div id="toast-container"></div>
    <div id="modals-container"></div>

    <!-- ─── LOGIN PAGE ─────────────────────────────────────────── -->
    <div id="login-page">
        <div class="particles-bg" id="particles-bg"></div>
        <div class="login-scene">
            <div class="card-wrap" id="card-wrap">
                <div class="neon-border"></div>
                <div class="login-card">
                    <div class="fold-cover" id="fold-cover" onclick="window.openLoginCard()">
                        <div class="cover-title">
                            <span class="cover-emoji">🏫</span>
                            ECOLE LA FONTAINE
                        </div>
                    </div>
                    <div class="login-content">
                        <div class="logo-box"><span>🏫</span></div>
                        <div class="school-name">ECOLE LA FONTAINE</div>
                        <div class="login-subtitle">School Management System</div>
                        <div class="login-form">
                            <div class="login-field">
                                <select id="login-role" onchange="window.onRoleChange()">
                                    <option value="admin">👨‍💼 Administrator</option>
                                    <option value="accountant">💰 Accountant</option>
                                    <option value="teacher">👩‍🏫 Teacher</option>
                                </select>
                            </div>
                            <div class="login-field" id="username-field" style="display:none">
                                <input type="text" id="login-username" placeholder="Username" autocomplete="username">
                            </div>
                            <div class="login-field pw-wrap">
                                <input type="password" id="login-password" placeholder="Password"
                                    autocomplete="current-password"
                                    onkeydown="if(event.key==='Enter') window.doLogin()">
                                <button class="pw-toggle" type="button" onclick="window.toggleLoginPw()" title="Show/hide password">👁️</button>
                            </div>
                            <div class="login-alert" id="login-alert" style="display:none"></div>
                            <button class="login-btn" id="login-btn" onclick="window.doLogin()">Sign In →</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── MAIN APP ────────────────────────────────────────────── -->
    <div id="app-page" style="display:none">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-content">
            <header class="topbar" id="topbar"></header>
            <div class="term-progress-bar" id="term-progress-bar"></div>
            <div id="dynamic-content">
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p>Initializing application…</p>
                </div>
            </div>
        </div>
    </div>

    <!--
        Single entry-point module script.
        Everything is imported through app.js which triggers initApp() on DOMContentLoaded.
        No inline logic lives here — all globals (doLogin, navigateTo, etc.) are attached
        to window inside their respective core modules.
    -->
    <script type="module">
        import { initTheme } from './js/ui/theme-manager.js';
        import { initApp }   from './js/core/app.js';

        // Particle background for login page
        function initParticles() {
            const c = document.getElementById('particles-bg');
            if (!c) return;
            for (let i = 0; i < 18; i++) {
                const p  = document.createElement('div');
                p.className = 'particle';
                const sz = 4 + Math.random() * 20;
                p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;` +
                                  `animation-duration:${8 + Math.random()*15}s;` +
                                  `animation-delay:${-Math.random()*20}s;`;
                c.appendChild(p);
            }
        }

        initParticles();
        initTheme();

        // Boot the app (checks stored session → shows login or dashboard)
        document.addEventListener('DOMContentLoaded', () => initApp());
    </script>
</body>
</html>
