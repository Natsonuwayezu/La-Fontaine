<!-- html/academics/attendance-entry.html -->
<!-- Attendance Entry Page -->
<div class="attendance-entry-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📋 ATTENDANCE ENTRY</span></div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group"><label>Class</label><select>
                        <option>PRIMARY 4</option>
                    </select></div>
                <div class="form-group"><label>Date</label><input type="date" class="form-control"></div>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Status</th>
                            <th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>John Doe</td>
                            <td><select>
                                    <option>Present</option>
                                    <option>Absent</option>
                                    <option>Late</option>
                                </select></td>
                            <td><input type="text" class="form-control" placeholder="Remarks"></td>
                        </tr>
                        <tr>
                            <td>Jane Smith</td>
                            <td><select>
                                    <option>Present</option>
                                    <option>Absent</option>
                                    <option>Late</option>
                                </select></td>
                            <td><input type="text" class="form-control" placeholder="Remarks"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="btn-group"><button class="btn btn-success">💾 Save Attendance</button></div>
        </div>
    </div>
</div>
