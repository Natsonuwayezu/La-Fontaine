<!-- html/academics/academic-reports.html -->
<!-- Academic Reports Page -->
<div class="academic-reports-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📊 Academic Reports</span></div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group"><label>Report Type</label><select>
                        <option>Class Performance</option>
                        <option>Subject Analysis</option>
                        <option>Grade Distribution</option>
                    </select></div>
                <div class="form-group"><label>Class</label><select>
                        <option>All Classes</option>
                        <option>PRIMARY 4</option>
                    </select></div>
                <div class="form-group"><label>Term</label><select>
                        <option>Term 3</option>
                        <option>Term 2</option>
                    </select></div>
            </div>
            <div class="btn-group"><button class="btn btn-primary">📊 Generate Report</button><button
                    class="btn btn-outline">📥 Export</button></div>
            <div id="report-chart"
                style="margin-top:20px;height:300px;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center">
                <span>Chart will appear here</span>
            </div>
        </div>
    </div>
</div>
