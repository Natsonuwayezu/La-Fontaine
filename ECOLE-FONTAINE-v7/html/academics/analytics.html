<!-- html/academics/analytics.html -->
<!-- Analytics Dashboard Page -->
<div class="analytics-dashboard-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📈 Analytics Dashboard</span><button
                class="btn btn-sm btn-outline">📤 Export Report</button></div>
        <div class="dash-card-body">
            <div class="dash-card">
                <div class="dash-card-header">📊 Term Performance Comparison</div>
                <div class="dash-card-body"><canvas id="term-chart" height="250"
                        style="background:var(--bg-tertiary)"></canvas></div>
            </div>
            <div class="dash-card">
                <div class="dash-card-header">📖 Subject Performance by Term</div>
                <div class="dash-card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Term 1</th>
                                <th>Term 2</th>
                                <th>Term 3</th>
                                <th>Trend</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Mathematics</td>
                                <td>78%</td>
                                <td>82%</td>
                                <td>85%</td>
                                <td>📈 Improving</td>
                            </tr>
                            <tr>
                                <td>English</td>
                                <td>75%</td>
                                <td>76%</td>
                                <td>74%</td>
                                <td>📊 Stable</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
