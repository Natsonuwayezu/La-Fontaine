<!-- html/academics/report-cards.html -->
<!-- Report Cards Page -->
<div class="report-cards-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📄 Report Cards</span><span
                class="phase-badge phase-post">📝 POST-MIDTERM</span></div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group"><label>Report Type</label><select>
                        <option>End of Term</option>
                        <option>Mid-term</option>
                        <option>Annual</option>
                    </select></div>
                <div class="form-group"><label>Term</label><select>
                        <option>Term 3</option>
                        <option>Term 2</option>
                    </select></div>
                <div class="form-group"><label>Class</label><select>
                        <option>PRIMARY 4</option>
                        <option>PRIMARY 5</option>
                    </select></div>
                <div class="form-group"><label>Student</label><select>
                        <option>John Doe</option>
                        <option>Jane Smith</option>
                    </select></div>
            </div>
            <div class="btn-group"><button class="btn btn-primary">📄 Generate</button><button
                    class="btn btn-outline">🖨️ Print</button><button class="btn btn-outline">📑 PDF</button></div>
            <div id="report-card-preview" style="margin-top:20px;display:none;border:1px solid #ccc;padding:20px">
                <h3>Report Card Preview</h3>
                <p>Generate a report card to see preview</p>
            </div>
        </div>
    </div>
</div>
