<!-- html/settings/school-settings.html -->
<!-- School Settings Page -->
<div class="settings-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">🏫 School Settings</span>
            <button class="btn btn-sm btn-success" onclick="saveSchoolSettings()">💾 Save All</button>
        </div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>School Name</label>
                    <input type="text" id="setting-school-name" class="form-control" value="ECOLE LA FONTAINE">
                </div>
                <div class="form-group">
                    <label>School Motto</label>
                    <input type="text" id="setting-motto" class="form-control" value="We Excell">
                </div>
                <div class="form-group">
                    <label>Location / Address</label>
                    <input type="text" id="setting-location" class="form-control" value="Rubavu, Rwanda">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="setting-phone" class="form-control" value="+250788534320">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="setting-email" class="form-control" value="info@ecolelafontaine.rw">
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="text" id="setting-website" class="form-control" value="www.ecolelafontaine.rw">
                </div>
                <div class="form-group">
                    <label>PO Box</label>
                    <input type="text" id="setting-pobox" class="form-control" value="Box 123, Rubavu">
                </div>
                <div class="form-group">
                    <label>School Logo</label>
                    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                        <div id="logo-preview"
                            style="width:80px;height:80px;background:var(--bg-tertiary);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden">
                            <span style="font-size:48px;">🏫</span>
                        </div>
                        <input type="file" id="setting-logo-file" accept="image/*" style="display:none">
                        <button class="btn btn-sm btn-outline"
                            onclick="document.getElementById('setting-logo-file').click()">📤 Upload Logo</button>
                        <button class="btn btn-sm btn-outline" onclick="removeLogo()">🗑️ Remove</button>
                    </div>
                    <input type="hidden" id="setting-logo-data" value="🏫">
                    <small class="field-hint">Upload PNG, JPG, or GIF (max 2MB). Logo appears on report cards, receipts,
                        and sidebar.</small>
                </div>
            </div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📅 Academic Settings</span>
        </div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>Current Academic Year</label>
                    <select id="setting-year" class="form-control">
                        <option value="1">2025-2026</option>
                        <option value="2">2026-2027</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Current Term</label>
                    <select id="setting-term" class="form-control">
                        <option value="1">Term 1</option>
                        <option value="2">Term 2</option>
                        <option value="3" selected>Term 3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Term Start Date</label>
                    <input type="date" id="setting-term-start" class="form-control" value="2026-01-10">
                </div>
                <div class="form-group">
                    <label>Term End Date</label>
                    <input type="date" id="setting-term-end" class="form-control" value="2026-03-20">
                </div>
            </div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📄 Report Card Settings</span>
        </div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Report Footer Line 1</label>
                    <input type="text" id="setting-footer-line1" class="form-control" value="Done at ECOLE LA FONTAINE">
                </div>
                <div class="form-group full">
                    <label>Report Footer Line 2 (Head of School)</label>
                    <input type="text" id="setting-footer-line2" class="form-control" value="UWAYO GANZA Eugene">
                </div>
                <div class="form-group">
                    <label>Head Teacher Title</label>
                    <input type="text" id="setting-head-title" class="form-control" value="THE SCHOOL HEADTEACHER">
                </div>
                <div class="form-group">
                    <label>Default Pass Mark (%)</label>
                    <input type="number" id="setting-pass-mark" class="form-control" value="50" min="0" max="100">
                </div>
            </div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">🔐 Security Settings</span>
        </div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="setting-admin-pw" class="form-control" placeholder="Change password">
                    <small class="field-hint">Leave blank to keep current password</small>
                </div>
                <div class="form-group">
                    <label>Session Timeout (minutes)</label>
                    <input type="number" id="setting-session-timeout" class="form-control" value="30" min="5" max="120">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="setting-force-2fa"> Enforce Two-Factor Authentication for
                        Admin</label>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .settings-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    function saveSchoolSettings() {
        const schoolName = document.getElementById('setting-school-name').value;
        const motto = document.getElementById('setting-motto').value;
        const location = document.getElementById('setting-location').value;
        const phone = document.getElementById('setting-phone').value;
        const email = document.getElementById('setting-email').value;

        alert(`School settings saved:\n${schoolName}\n${motto}\n${location}\n${phone}\n${email}`);
    }

    function removeLogo() {
        document.getElementById('logo-preview').innerHTML = '<span style="font-size:48px;">🏫</span>';
        document.getElementById('setting-logo-data').value = '🏫';
        alert('Logo removed');
    }

    // File upload handler
    document.getElementById('setting-logo-file').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (file && file.size <= 2 * 1024 * 1024) {
            const reader = new FileReader();
            reader.onload = function (ev) {
                document.getElementById('logo-preview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                document.getElementById('setting-logo-data').value = ev.target.result;
            };
            reader.readAsDataURL(file);
        } else if (file) {
            alert('File too large. Max 2MB.');
        }
    });
</script>
