<!-- html/settings/class-management.html -->
<!-- Class Management Page -->
<div class="class-management-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">🏛️ Class Management</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-primary" onclick="openAddClassModal()">➕ Add Class</button>
                <button class="btn btn-sm btn-warning" onclick="openPromoteStudentsModal()">🚀 Promote Students</button>
                <button class="btn btn-sm btn-outline" onclick="exportClasses()">📥 Export</button>
            </div>
        </div>
        <div class="dash-card-body" style="padding:0">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>Class</th>
                            <th>Code</th>
                            <th>Level</th>
                            <th>Students</th>
                            <th>Capacity</th>
                            <th>Utilization</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="text-align:center">1</td>
                            <td><strong>NURSERY 1</strong></td>
                            <td>N1</td>
                            <td><span class="badge badge-info">Nursery</span></td>
                            <td style="text-align:center">25</td>
                            <td style="text-align:center"><input type="number" value="40" style="width:70px"
                                    class="form-control"></td>
                            <td style="text-align:center"><span class="badge badge-success">62.5%</span></td>
                            <td style="text-align:center"><span class="badge badge-success">Active</span></td>
                            <td><button class="btn btn-sm btn-outline">✏️</button> <button
                                    class="btn btn-sm btn-danger">Deactivate</button> <button
                                    class="btn btn-sm btn-outline">👥</button></td>
                        </tr>
                        <tr>
                            <td style="text-align:center">2</td>
                            <td><strong>NURSERY 2</strong></td>
                            <td>N2</td>
                            <td><span class="badge badge-info">Nursery</span></td>
                            <td style="text-align:center">30</td>
                            <td style="text-align:center"><input type="number" value="40" style="width:70px"
                                    class="form-control"></td>
                            <td style="text-align:center"><span class="badge badge-success">75%</span></td>
                            <td style="text-align:center"><span class="badge badge-success">Active</span></td>
                            <td><button class="btn btn-sm btn-outline">✏️</button> <button
                                    class="btn btn-sm btn-danger">Deactivate</button> <button
                                    class="btn btn-sm btn-outline">👥</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📊 Class Statistics</span>
        </div>
        <div class="dash-card-body">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">9</div>
                    <div class="stat-label">Total Classes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">245</div>
                    <div class="stat-label">Total Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">360</div>
                    <div class="stat-label">Total Capacity</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">68%</div>
                    <div class="stat-label">Overall Utilization</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .class-management-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    function openAddClassModal() {
        const className = prompt('Enter class name (e.g., PRIMARY 4 A):');
        if (className) {
            alert(`Class "${className}" created`);
        }
    }

    function openPromoteStudentsModal() {
        alert('Promote students wizard would open');
    }

    function exportClasses() {
        alert('Exporting classes to Excel');
    }
</script>
