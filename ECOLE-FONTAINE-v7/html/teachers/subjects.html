<!-- html/teachers/subjects.html -->
<!-- Subjects Management Page -->
<div class="subjects-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">📖 Subjects Management</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-primary" onclick="openAddSubjectModal()">➕ Add Subject</button>
                <button class="btn btn-sm btn-success" onclick="saveAllSubjects()">💾 Save All</button>
                <button class="btn btn-sm btn-outline" onclick="exportSubjects()">📥 Export</button>
            </div>
        </div>
        <div class="dash-card-body">
            <div class="tabs">
                <button class="tab-btn active" onclick="showSubjectTab('nursery', event)">🎒 Nursery</button>
                <button class="tab-btn" onclick="showSubjectTab('primary', event)">📚 Primary</button>
            </div>

            <div id="nursery-subjects" class="tab-content">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Subject Name</th>
                                <th>Code</th>
                                <th>MG Max</th>
                                <th>EX Max</th>
                                <th>Post-Mid Only</th>
                                <th>Status</th>
                                <th>Actions</th>
                                </td>
                        </thead>
                        <tbody id="nursery-subjects-tbody">
                            <tr>
                                <td colspan="8" style="text-align:center;padding:40px">Loading...</span>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="primary-subjects" class="tab-content" style="display:none">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Subject Name</th>
                                <th>Code</th>
                                <th>MG Max</th>
                                <th>EX Max</th>
                                <th>Post-Mid Only</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="primary-subjects-tbody">
                            <tr>
                                <td colspan="8" style="text-align:center;padding:40px">Loading...</span>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📊 Subject Statistics</span>
        </div>
        <div class="dash-card-body">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-subjects">0</div>
                    <div class="stat-label">Total Subjects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="nursery-count">0</div>
                    <div class="stat-label">Nursery Subjects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="primary-count">0</div>
                    <div class="stat-label">Primary Subjects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-subjects">0</div>
                    <div class="stat-label">Active Subjects</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .subjects-container {
        animation: fadeIn 0.3s ease;
    }

    .tab-content {
        margin-top: 20px;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    let subjectsData = {
        nursery: [
            { id: 1, name: 'Kinyarwanda', code: 'KIN', mg_max: 50, ex_max: 50, post_mid_only: false, active: true },
            { id: 2, name: 'Mathematics', code: 'MAT', mg_max: 50, ex_max: 50, post_mid_only: false, active: true },
            { id: 3, name: 'Science', code: 'SCI', mg_max: 50, ex_max: 50, post_mid_only: false, active: true }
        ],
        primary: [
            { id: 4, name: 'English', code: 'ENG', mg_max: 50, ex_max: 50, post_mid_only: false, active: true },
            { id: 5, name: 'Mathematics', code: 'MAT', mg_max: 50, ex_max: 50, post_mid_only: false, active: true },
            { id: 6, name: 'Science', code: 'SCI', mg_max: 50, ex_max: 50, post_mid_only: false, active: true },
            { id: 7, name: 'Social Studies', code: 'SST', mg_max: 50, ex_max: 50, post_mid_only: false, active: true }
        ]
    };

    function renderSubjects(level) {
        const tbody = document.getElementById(`${level}-subjects-tbody`);
        const subjects = subjectsData[level];

        document.getElementById('total-subjects').textContent = subjectsData.nursery.length + subjectsData.primary.length;
        document.getElementById('nursery-count').textContent = subjectsData.nursery.length;
        document.getElementById('primary-count').textContent = subjectsData.primary.length;
        document.getElementById('active-subjects').textContent = [...subjectsData.nursery, ...subjectsData.primary].filter(s => s.active).length;

        if (!tbody) return;

        if (subjects.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px">No subjects found</span></tr>';
            return;
        }

        tbody.innerHTML = subjects.map((s, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td><input type="text" class="subject-name" data-id="${s.id}" value="${s.name}" style="width:100%"></td>
                <td><code>${s.code}</code></td>
                <td><input type="number" class="subject-mg" data-id="${s.id}" value="${s.mg_max}" style="width:70px"></td>
                <td><input type="number" class="subject-ex" data-id="${s.id}" value="${s.ex_max}" style="width:70px"></td>
                <td style="text-align:center"><input type="checkbox" class="subject-postonly" data-id="${s.id}" ${s.post_mid_only ? 'checked' : ''}></td>
                <td><span class="badge ${s.active ? 'badge-success' : 'badge-danger'}">${s.active ? 'Active' : 'Inactive'}</span></td>
                <td>
                    <div class="btn-group" style="gap:4px">
                        <button class="btn btn-sm btn-outline" onclick="toggleSubjectStatus(${s.id})">${s.active ? 'Hide' : 'Show'}</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSubject(${s.id})">🗑️</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function showSubjectTab(level, event) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('nursery-subjects').style.display = level === 'nursery' ? 'block' : 'none';
        document.getElementById('primary-subjects').style.display = level === 'primary' ? 'block' : 'none';
    }

    function openAddSubjectModal() {
        const level = prompt('Select level (Nursery/Primary):');
        if (level && (level.toLowerCase() === 'nursery' || level.toLowerCase() === 'primary')) {
            const name = prompt('Subject name:');
            const code = prompt('Subject code (3 letters):');
            if (name && code) {
                const newSubject = {
                    id: Date.now(),
                    name: name,
                    code: code.toUpperCase(),
                    mg_max: 50,
                    ex_max: 50,
                    post_mid_only: false,
                    active: true
                };
                subjectsData[level.toLowerCase()].push(newSubject);
                renderSubjects(level.toLowerCase());
                alert('Subject added');
            }
        }
    }

    function saveAllSubjects() {
        // Collect all values from inputs
        alert('All subjects saved');
    }

    function toggleSubjectStatus(id) {
        let subject = [...subjectsData.nursery, ...subjectsData.primary].find(s => s.id === id);
        if (subject) {
            subject.active = !subject.active;
            renderSubjects(subject.level === 'Nursery' ? 'nursery' : 'primary');
            alert(`Subject ${subject.active ? 'activated' : 'deactivated'}`);
        }
    }

    function deleteSubject(id) {
        if (confirm('Delete this subject?')) {
            subjectsData.nursery = subjectsData.nursery.filter(s => s.id !== id);
            subjectsData.primary = subjectsData.primary.filter(s => s.id !== id);
            renderSubjects('nursery');
            renderSubjects('primary');
            alert('Subject deleted');
        }
    }

    function exportSubjects() {
        alert('Exporting subjects to Excel');
    }

    // Initial render
    renderSubjects('nursery');
    renderSubjects('primary');
</script>
