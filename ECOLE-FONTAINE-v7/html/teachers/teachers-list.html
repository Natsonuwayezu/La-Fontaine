<!-- html/teachers/teachers-list.html -->
<!-- Teachers List Page -->
<div class="teachers-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">👩‍🏫 Teachers List</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-primary" onclick="openAddTeacherModal()">➕ Add Teacher</button>
                <button class="btn btn-sm btn-outline" onclick="exportTeachers()">📥 Export</button>
            </div>
        </div>
        <div class="dash-card-body">
            <div class="filters-bar">
                <select id="teacher-role-filter" class="form-control" style="width:150px" onchange="filterTeachers()">
                    <option value="">All Roles</option>
                    <option value="teacher">Teacher</option>
                    <option value="accountant">Accountant</option>
                    <option value="admin">Admin</option>
                </select>
                <select id="teacher-status-filter" class="form-control" style="width:130px" onchange="filterTeachers()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                <input type="text" id="teacher-search" class="form-control flex-1"
                    placeholder="🔍 Search by name, email, username..." oninput="filterTeachers()">
                <span class="result-count" id="teacher-count"></span>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Avatar</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="teachers-tbody">
                        <tr>
                            <td colspan="9" style="text-align:center;padding:40px">Loading teachers...</span>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="teachers-pagination" style="margin-top:16px"></div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📊 Teacher Statistics</span>
        </div>
        <div class="dash-card-body">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-teachers">0</div>
                    <div class="stat-label">Total Teachers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-teachers">0</div>
                    <div class="stat-label">Active Teachers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="departments-count">0</div>
                    <div class="stat-label">Departments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avg-classes">0</div>
                    <div class="stat-label">Avg Classes/Teacher</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .teachers-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    let teachersData = [
        { id: 1, name: 'John MUKESA', email: 'john@school.com', username: 'john.m', role: 'teacher', department: 'Mathematics', status: 'active', last_login: '2026-01-15' },
        { id: 2, name: 'Jane UWIMANA', email: 'jane@school.com', username: 'jane.u', role: 'teacher', department: 'English', status: 'active', last_login: '2026-01-14' },
        { id: 3, name: 'Peter KAGAME', email: 'peter@school.com', username: 'peter.k', role: 'accountant', department: 'Finance', status: 'active', last_login: '2026-01-13' },
        { id: 4, name: 'Admin User', email: 'admin@school.com', username: 'admin', role: 'admin', department: 'Administration', status: 'active', last_login: '2026-01-15' }
    ];

    function renderTeachersTable() {
        const tbody = document.getElementById('teachers-tbody');
        const roleFilter = document.getElementById('teacher-role-filter').value;
        const statusFilter = document.getElementById('teacher-status-filter').value;
        const search = document.getElementById('teacher-search').value.toLowerCase();

        let filtered = teachersData.filter(t => {
            if (roleFilter && t.role !== roleFilter) return false;
            if (statusFilter && (statusFilter === 'active' ? t.status !== 'active' : t.status === 'active')) return false;
            if (search && !t.name.toLowerCase().includes(search) && !t.email.toLowerCase().includes(search) && !t.username.toLowerCase().includes(search)) return false;
            return true;
        });

        document.getElementById('teacher-count').textContent = `${filtered.length} teacher${filtered.length !== 1 ? 's' : ''}`;
        document.getElementById('total-teachers').textContent = teachersData.length;
        document.getElementById('active-teachers').textContent = teachersData.filter(t => t.status === 'active').length;

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">No teachers found</span></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(t => `
            <tr>
                <td style="text-align:center"><div class="user-avatar" style="width:32px;height:32px;background:var(--role-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px">${t.role === 'admin' ? '👨‍💼' : (t.role === 'accountant' ? '💰' : '👩‍🏫')}</div></span>
                <td><strong>${t.name}</strong></span>
                <td>${t.email}</span>
                <td><code>${t.username}</code></span>
                <td><span class="badge ${t.role === 'admin' ? 'badge-danger' : (t.role === 'accountant' ? 'badge-warning' : 'badge-info')}">${t.role}</span></span>
                <td>${t.department}</span>
                <td><span class="badge ${t.status === 'active' ? 'badge-success' : 'badge-danger'}">${t.status === 'active' ? 'Active' : 'Inactive'}</span></span>
                <td>${t.last_login || 'Never'}</span>
                <td>
                    <div class="btn-group" style="gap:4px">
                        <button class="btn btn-sm btn-outline" onclick="viewTeacher(${t.id})" title="View">👁️</button>
                        <button class="btn btn-sm btn-outline" onclick="editTeacher(${t.id})" title="Edit">✏️</button>
                        <button class="btn btn-sm btn-warning" onclick="resetTeacherPassword(${t.id})" title="Reset Password">🔒</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteTeacher(${t.id})" title="Delete">🗑️</button>
                    </div>
                </span>
            </tr>
        `).join('');
    }

    function filterTeachers() {
        renderTeachersTable();
    }

    function openAddTeacherModal() {
        alert('Add teacher modal would open here');
    }

    function viewTeacher(id) {
        alert(`View teacher ${id}`);
    }

    function editTeacher(id) {
        alert(`Edit teacher ${id}`);
    }

    function resetTeacherPassword(id) {
        if (confirm('Reset password for this teacher?')) {
            alert('Password reset to: password123');
        }
    }

    function deleteTeacher(id) {
        if (confirm('Delete this teacher? This action cannot be undone.')) {
            teachersData = teachersData.filter(t => t.id !== id);
            renderTeachersTable();
            alert('Teacher deleted');
        }
    }

    function exportTeachers() {
        alert('Exporting teachers list to Excel');
    }

    // Initial render
    renderTeachersTable();
</script>
