<!-- html/students/student-archive.html -->
<!-- Student Archive Page -->
<div class="archive-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">📦 Student Archive</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-warning" onclick="runAutoArchive()">🔄 Run Auto-Archive Now</button>
            </div>
        </div>
        <div class="dash-card-body">
            <div class="alert alert-info">
                ⚠️ 5 students have been inactive for over 1 year and are ready for archiving.
                <button class="btn btn-sm btn-primary" onclick="runAutoArchive()">Archive Now</button>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Class (Last)</th>
                            <th>Last Active</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>John Doe</strong></td>
                            <td><span class="badge badge-neutral">Inactive</span></td>
                            <td>PRIMARY 4</td>
                            <td>2025-06-15</td>
                            <td><button class="btn btn-sm btn-success">♻️ Restore</button> <button
                                    class="btn btn-sm btn-danger">🗑️ Permanent</button></td>
                        </tr>
                        <tr>
                            <td><strong>Jane Smith</strong></td>
                            <td><span class="badge badge-neutral">Graduated</span></td>
                            <td>PRIMARY 6</td>
                            <td>2025-11-20</td>
                            <td><button class="btn btn-sm btn-success">♻️ Restore</button> <button
                                    class="btn btn-sm btn-danger">🗑️ Permanent</button></td>
                        </tr>
                        <tr>
                            <td><strong>Peter Kagame</strong></td>
                            <td><span class="badge badge-neutral">Transferred</span></td>
                            <td>PRIMARY 3</td>
                            <td>2025-08-10</td>
                            <td><button class="btn btn-sm btn-success">♻️ Restore</button> <button
                                    class="btn btn-sm btn-danger">🗑️ Permanent</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .archive-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    function runAutoArchive() {
        if (confirm('Archive students inactive for over 1 year?')) {
            alert('Auto-archive completed');
        }
    }
</script>
