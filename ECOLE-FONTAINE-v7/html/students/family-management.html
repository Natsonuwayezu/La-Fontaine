<!-- html/students/family-management.html -->
<!-- Family Management Page -->
<div class="family-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">🏠 Family Management</span>
            <button class="btn btn-sm btn-primary" onclick="addFamily()">➕ Add Family</button>
        </div>
        <div class="dash-card-body">
            <div class="filters-bar">
                <input type="text" id="family-search" class="form-control flex-1"
                    placeholder="🔍 Search family code or guardian..." oninput="filterFamilies()">
                <span class="result-count" id="family-count"></span>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Family Code</th>
                            <th>Guardian Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Members</th>
                            <th>Discount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="families-tbody">
                        <tr>
                            <td><code>FAM-001</code></td>
                            <td>John Doe</td>
                            <td>+250788123456</td>
                            <td>john@email.com</td>
                            <td>2</td>
                            <td>10,000 RWF</td>
                            <td><button class="btn btn-sm btn-outline">✏️</button> <button
                                    class="btn btn-sm btn-danger">🗑️</button> <button class="btn btn-sm btn-info">💰
                                    Fees</button></td>
                        </tr>
                        <tr>
                            <td><code>FAM-002</code></td>
                            <td>Jane Smith</td>
                            <td>+250788654321</td>
                            <td>jane@email.com</td>
                            <td>1</td>
                            <td>0 RWF</td>
                            <td><button class="btn btn-sm btn-outline">✏️</button> <button
                                    class="btn btn-sm btn-danger">🗑️</button> <button class="btn btn-sm btn-info">💰
                                    Fees</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .family-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    function addFamily() {
        alert('Add family modal would open');
    }

    function filterFamilies() {
        const search = document.getElementById('family-search').value.toLowerCase();
        const rows = document.querySelectorAll('#families-tbody tr');
        let visible = 0;
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            if (text.includes(search)) {
                row.style.display = '';
                visible++;
            } else {
                row.style.display = 'none';
            }
        });
        document.getElementById('family-count').textContent = `${visible} famil${visible !== 1 ? 'ies' : 'y'}`;
    }
</script>
