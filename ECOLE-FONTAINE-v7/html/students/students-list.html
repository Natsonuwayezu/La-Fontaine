<!-- html/students/students-list.html -->
<!-- Student List Page -->
<div class="students-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">👥 Students List</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-primary" onclick="navigateTo('enroll-student')">➕ Enroll Student</button>
                <button class="btn btn-sm btn-outline" onclick="navigateTo('bulk-import')">📤 Import Excel</button>
                <button class="btn btn-sm btn-outline" onclick="exportStudentsData()">📥 Export</button>
            </div>
        </div>
        <div class="dash-card-body">
            <div class="filters-bar">
                <select id="sf-class" class="form-control" style="width:180px" onchange="filterStudents()">
                    <option value="">All Classes</option>
                    <option value="1">NURSERY 1</option>
                    <option value="2">NURSERY 2</option>
                    <option value="3">NURSERY 3</option>
                    <option value="4">PRIMARY 1</option>
                    <option value="5">PRIMARY 2</option>
                    <option value="6">PRIMARY 3</option>
                    <option value="7">PRIMARY 4</option>
                    <option value="8">PRIMARY 5</option>
                    <option value="9">PRIMARY 6</option>
                </select>
                <select id="sf-status" class="form-control" style="width:150px" onchange="filterStudents()">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                    <option value="Transferred">Transferred</option>
                    <option value="Graduated">Graduated</option>
                </select>
                <input type="text" id="sf-search" class="form-control flex-1" placeholder="🔍 Search name or code..."
                    oninput="filterStudents()">
                <span class="result-count" id="sf-count"></span>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Full Name</th>
                            <th>Class</th>
                            <th>Gender</th>
                            <th>Guardian</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="students-tbody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:40px">Loading students...</span>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="students-pagination" style="margin-top:16px"></div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📊 Student Statistics</span>
        </div>
        <div class="dash-card-body">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-students">0</div>
                    <div class="stat-label">Total Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-students">0</div>
                    <div class="stat-label">Active Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="male-count">0</div>
                    <div class="stat-label">Male</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="female-count">0</div>
                    <div class="stat-label">Female</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .students-container {
        animation: fadeIn 0.3s ease;
    }

    .student-row {
        transition: all 0.2s;
    }

    .student-row:hover {
        background: var(--bg-tertiary);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    let studentsData = [
        { id: 1, code: 'P4A001', firstName: 'John', lastName: 'Doe', classId: 7, className: 'PRIMARY 4', gender: 'Male', guardian: 'Jane Doe', status: 'Active' },
        { id: 2, code: 'P4A002', firstName: 'Jane', lastName: 'Smith', classId: 7, className: 'PRIMARY 4', gender: 'Female', guardian: 'John Smith', status: 'Active' },
        { id: 3, code: 'P5A001', firstName: 'Peter', lastName: 'Kagame', classId: 8, className: 'PRIMARY 5', gender: 'Male', guardian: 'Alice Kagame', status: 'Active' },
        { id: 4, code: 'N2001', firstName: 'Alice', lastName: 'Uwimana', classId: 2, className: 'NURSERY 2', gender: 'Female', guardian: 'Paul Uwimana', status: 'Active' }
    ];

    let currentPage = 1;
    let pageSize = 20;

    function renderStudentsTable() {
        const classFilter = document.getElementById('sf-class').value;
        const statusFilter = document.getElementById('sf-status').value;
        const search = document.getElementById('sf-search').value.toLowerCase();

        let filtered = studentsData.filter(s => {
            if (classFilter && s.classId != classFilter) return false;
            if (statusFilter && s.status !== statusFilter) return false;
            if (search && !s.firstName.toLowerCase().includes(search) && !s.lastName.toLowerCase().includes(search) && !s.code.toLowerCase().includes(search)) return false;
            return true;
        });

        const totalStudents = studentsData.length;
        const activeCount = studentsData.filter(s => s.status === 'Active').length;
        const maleCount = studentsData.filter(s => s.gender === 'Male').length;
        const femaleCount = studentsData.filter(s => s.gender === 'Female').length;

        document.getElementById('total-students').textContent = totalStudents;
        document.getElementById('active-students').textContent = activeCount;
        document.getElementById('male-count').textContent = maleCount;
        document.getElementById('female-count').textContent = femaleCount;
        document.getElementById('sf-count').textContent = `${filtered.length} student${filtered.length !== 1 ? 's' : ''}`;

        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageStudents = filtered.slice(start, end);

        const tbody = document.getElementById('students-tbody');
        if (pageStudents.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px">No students found</span></tr>';
            return;
        }

        tbody.innerHTML = pageStudents.map(s => `
            <tr class="student-row">
                <td><code>${s.code}</code></td>
                <td><strong>${s.firstName} ${s.lastName}</strong></td>
                <td>${s.className}</td>
                <td>${s.gender}</td>
                <td>${s.guardian}</td>
                <td><span class="badge ${s.status === 'Active' ? 'badge-success' : 'badge-danger'}">${s.status}</span></td>
                <td>
                    <div class="btn-group" style="gap:4px">
                        <button class="btn btn-sm btn-outline" onclick="viewStudent(${s.id})" title="View">👁️</button>
                        <button class="btn btn-sm btn-outline" onclick="editStudent(${s.id})" title="Edit">✏️</button>
                        <button class="btn btn-sm btn-primary" onclick="recordPayment(${s.id})" title="Record Payment">💰</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteStudent(${s.id})" title="Delete">🗑️</button>
                    </div>
                </td>
            </tr>
        `).join('');

        renderPagination(filtered.length);
    }

    function renderPagination(total) {
        const totalPages = Math.ceil(total / pageSize);
        const pagination = document.getElementById('students-pagination');
        if (!pagination) return;

        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        for (let i = 1; i <= Math.min(totalPages, 10); i++) {
            html += `<div class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</div>`;
        }
        pagination.innerHTML = html;
    }

    function goToPage(page) {
        currentPage = page;
        renderStudentsTable();
    }

    function filterStudents() {
        currentPage = 1;
        renderStudentsTable();
    }

    function viewStudent(id) {
        alert(`View student ${id}`);
    }

    function editStudent(id) {
        alert(`Edit student ${id}`);
    }

    function recordPayment(id) {
        alert(`Record payment for student ${id}`);
    }

    function deleteStudent(id) {
        if (confirm('Archive this student?')) {
            studentsData = studentsData.filter(s => s.id !== id);
            renderStudentsTable();
            alert('Student archived');
        }
    }

    function exportStudentsData() {
        alert('Exporting students to Excel');
    }

    // Initial render
    renderStudentsTable();
</script>
