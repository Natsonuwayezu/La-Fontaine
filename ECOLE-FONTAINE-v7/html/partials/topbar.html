<!-- html/partials/topbar.html -->
<!-- Topbar structure -->
<header class="topbar">
    <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()" title="Menu">☰</button>
        <span class="page-title" id="page-title">Dashboard</span>
    </div>
    <div class="topbar-right">
        <span id="phase-indicator-compact" class="phase-badge-compact"></span>
        <button id="pwa-install-btn" class="btn btn-sm btn-outline" onclick="installPWA()" title="Install App"
            style="display:none">📲</button>
        <span class="notif-bell" onclick="showNotificationsModal()" title="Notifications">
            🔔<span class="notif-dot" id="notif-dot" style="display:none;"></span>
        </span>
        <div class="user-menu" onclick="toggleUserDropdown()">
            <div class="user-avatar" id="topbar-avatar">👤</div>
            <span class="user-name" id="topbar-username">User</span>
            <span class="user-dropdown-arrow">▾</span>
        </div>
    </div>
    <div class="user-dropdown" id="user-dropdown">
        <div class="dropdown-item dropdown-user-info">
            <div class="dropdown-avatar">👤</div>
            <div>
                <div class="dropdown-user-name" id="dropdown-username">Administrator</div>
                <div class="dropdown-user-role" id="dropdown-userrole">Admin</div>
            </div>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" onclick="showProfileModal()"><span>👤</span> My Profile</div>
        <div class="dropdown-item" onclick="showChangePasswordModal()"><span>🔒</span> Change Password</div>
        <div class="dropdown-item" onclick="toggleTheme()" id="dropdown-theme-item">
            <span id="dropdown-theme-icon">🌙</span> <span id="dropdown-theme-text">Dark Mode</span>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item danger" onclick="logout()"><span>🚪</span> Logout</div>
    </div>
</header>
