<!-- Overdue Payments Page -->
<div class="overdue-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">⚠️ Overdue Payments</span><span
                class="result-count">8 students</span></div>
        <div class="dash-card-body">
            <div class="alert alert-danger"><strong>🔴 CRITICAL (3 students - 30+ days)</strong></div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Balance</th>
                            <th>Days Overdue</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>John Doe</td>
                            <td>75,000 RWF</td>
                            <td class="overdue-red">45 days 🔴</td>
                            <td><button class="btn btn-sm btn-primary">💰 Pay Now</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
