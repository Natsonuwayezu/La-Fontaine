<!-- html/finance/payment-history.html -->
<!-- Payment History Page -->
<div class="payment-history-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📜 Payment History</span><button
                class="btn btn-sm btn-outline">📥 Export</button></div>
        <div class="dash-card-body">
            <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
                <div class="stat-card">
                    <div class="stat-value">2,125,000 RWF</div>
                    <div class="stat-label">Cash Payments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">125,000 RWF</div>
                    <div class="stat-label">Credit Used</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">2,250,000 RWF</div>
                    <div class="stat-label">Total Collection</div>
                </div>
            </div>
            <div class="filters-bar"><input type="text" placeholder="🔍 Search..." class="form-control flex-1"><span
                    class="result-count">45 transactions</span></div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Receipt #</th>
                            <th>Date</th>
                            <th>Student</th>
                            <th>Amount</th>
                            <th>Method</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>RCP-001</td>
                            <td>2026-01-15</td>
                            <td>John Doe</td>
                            <td>50,000 RWF</td>
                            <td>Cash</td>
                            <td><span class="badge badge-primary">Payment</span></td>
                            <td><button class="btn btn-sm btn-outline">🖨️</button></td>
                        </tr>
                        <tr>
                            <td>RCP-002</td>
                            <td>2026-01-14</td>
                            <td>Jane Smith</td>
                            <td>150,000 RWF</td>
                            <td>Bank Transfer</td>
                            <td><span class="badge badge-primary">Payment</span></td>
                            <td><button class="btn btn-sm btn-outline">🖨️</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
