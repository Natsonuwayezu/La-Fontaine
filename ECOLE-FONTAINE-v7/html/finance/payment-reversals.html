<!-- Payment Reversals Page -->
<div class="reversals-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">🔄 Payment Reversals</span></div>
        <div class="dash-card-body">
            <div class="alert alert-warning">⚠️ Warning: Reversing a payment cannot be undone.</div>
            <div class="filters-bar"><input type="text" placeholder="🔍 Search receipt..." class="form-control flex-1">
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Receipt #</th>
                            <th>Student</th>
                            <th>Amount</th>
                            <th>Age</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2026-01-10</td>
                            <td>RCP-010</td>
                            <td>John Doe</td>
                            <td>50,000 RWF</td>
                            <td>5 days</td>
                            <td><button class="btn btn-sm btn-danger">🔄 Reverse</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
