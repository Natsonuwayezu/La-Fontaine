<!-- Carry Forward Page -->
<div class="carry-forward-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">🔄 Carry Forward Unpaid Fees</span></div>
        <div class="dash-card-body">
            <div class="alert alert-warning">⚠️ Transfers unpaid fees from current to next academic year.</div>
            <div class="form-grid">
                <div class="form-group"><label>From Year</label><input readonly value="2025-2026" class="form-control">
                </div>
                <div class="form-group"><label>To Year</label><select class="form-control">
                        <option>2026-2027</option>
                    </select></div>
            </div>
            <div class="btn-group"><button class="btn btn-outline">👁️ Preview</button><button
                    class="btn btn-warning">🔄 Execute</button></div>
        </div>
    </div>
</div>
