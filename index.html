    <!-- ═══════════════════════════════════════════════════
         LOGIN PAGE
    ════════════════════════════════════════════════════ -->
    <div id="login-page">

        <div class="particles-bg" id="particles-bg"></div>

        <div class="login-scene">
            <div class="card-wrap" id="card-wrap">

                <div class="neon-border"></div>

                <div class="login-card">

                    <div class="fold-cover" id="fold-cover"
                        onclick="document.getElementById('card-wrap').classList.add('open')">
                        <div class="cover-title">
                            <span class="cover-emoji">🏫</span>
                            ECOLE LA FONTAINE
                        </div>
                    </div>

                    <div class="login-content">

                        <div class="logo-box" id="login-logo-box">
                            <span>🏫</span>
                        </div>

                        <div class="school-name">ECOLE LA FONTAINE</div>
                        <div class="login-subtitle" id="login-subtitle">Complete School Management System</div>

                        <div class="login-form">

                            <div class="login-field">
                                <select id="login-role" onchange="window.onRoleChange()">
                                    <option value="admin">👨‍💼 Administrator</option>
                                    <option value="accountant">💰 Accountant</option>
                                    <option value="teacher">👩‍🏫 Teacher</option>
                                </select>
                            </div>

                            <div class="login-field" id="username-field" style="display:none">
                                <input type="text" id="login-username" placeholder="Username" autocomplete="username">
                            </div>

                            <div class="login-field pw-wrap">
                                <input type="password" id="login-password" placeholder="Password"
                                    autocomplete="current-password"
                                    onkeydown="if(event.key==='Enter') window.doLogin()">
                                <button class="pw-toggle" type="button" onclick="window.toggleLoginPw()"
                                    title="Show/hide password">👁️</button>
                            </div>

                            <div id="biometric-btn-wrap" style="display:none; margin-top:8px">
                                <button class="login-btn" id="biometric-btn" onclick="window.doBiometricLogin()"
                                    style="background:linear-gradient(135deg,#1a3a5c,#2563eb); display:flex; align-items:center; justify-content:center; gap:8px">
                                    <span>🔑</span> Sign In with Biometrics
                                </button>
                            </div>

                            <div class="login-alert" id="login-alert" style="display:none"></div>

                            <button class="login-btn" id="login-btn" onclick="window.doLogin()">
                                Sign In →
                            </button>

                            <div style="text-align:center; margin-top:8px; font-size:.75rem">
                                <a href="#" onclick="window.setupBiometricLogin(); return false;"
                                    style="color:rgba(255,255,255,.5)">
                                    ⚙️ Set up biometric login
                                </a>
                            </div>

                        </div>

                    </div>

                </div>

            </div>
        </div>

    </div>
    <!-- END LOGIN PAGE -->


    <!-- ═══════════════════════════════════════════════════
         MAIN APPLICATION (hidden until login)
    ════════════════════════════════════════════════════ -->
    <div id="app-page" style="display:none">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Mobile sidebar overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle" onclick="window.toggleSidebar()"
                        title="Toggle Sidebar Menu">☰</button>
                    <span class="page-title" id="page-title">Dashboard</span>
                </div>

                <div class="topbar-center"></div>

                <div class="topbar-right">
                    <span id="phase-indicator-compact" class="phase-badge-compact"></span>

                    <button id="pwa-install-btn" class="btn btn-sm btn-outline" onclick="window.installPWA()"
                        title="Install App" style="display:none">📲 Install</button>

                    <div class="notif-bell-wrap" onclick="window.navigateTo('notification-center')" title="Notifications">
                        <span class="notif-bell-icon">🔔</span>
                        <span class="notif-dot" id="notif-dot" style="display:none"></span>
                    </div>

                    <div class="user-menu" onclick="window.toggleUserDropdown()">
                        <div class="user-avatar" id="topbar-avatar">👤</div>
                        <span class="user-name" id="topbar-username">User</span>
                        <span class="user-dropdown-arrow">▾</span>
                    </div>
                </div>

                <!-- User Dropdown -->
                <div class="user-dropdown" id="user-dropdown">
                    <div class="dropdown-item dropdown-user-info">
                        <div class="dropdown-avatar">👤</div>
                        <div>
                            <div class="dropdown-user-name" id="dropdown-username">Administrator</div>
                            <div class="dropdown-user-role" id="dropdown-userrole">Admin</div>
                        </div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="window.showProfileModal()">
                        <span>👤</span> My Profile
                    </div>
                    <div class="dropdown-item" onclick="window.showChangePasswordModal()">
                        <span>🔒</span> Change Password
                    </div>
                    <div class="dropdown-item" onclick="window.setupBiometricLogin()">
                        <span>🔑</span> Biometric Login
                    </div>
                    <div class="dropdown-item" onclick="window.toggleTheme()" id="dropdown-theme-item">
                        <span id="dropdown-theme-icon">🌙</span>
                        <span id="dropdown-theme-text">Dark Mode</span>
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item danger" onclick="window.logout()">
                        <span>🚪</span> Logout
                    </div>
                </div>

            </header>

            <!-- Term Progress Bar -->
            <div class="term-progress-bar" id="term-progress-bar">
                <span class="progress-label">
                    📅 <strong id="prog-term-name">Term 3</strong>
                    <span id="prog-acad-year" style="font-size:.7rem">2025-2026</span>
                </span>
                <div class="progress-bar-wrap">
                    <div class="progress-track">
                        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
                    </div>
                    <div class="progress-text" id="prog-text"
                        style="font-size:.68rem;color:var(--text-muted);margin-top:2px"></div>
                </div>
                <span class="progress-days" id="prog-days-wrap"
                    style="font-size:.75rem;white-space:nowrap;color:var(--text-muted)">
                    <strong id="prog-days">—</strong> days left
                </span>
            </div>

            <!-- Dynamic Content (all modules render here) -->
            <div id="dynamic-content">
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p>Initializing application...</p>
                </div>
            </div>

        </div>
        <!-- END MAIN CONTENT -->

    </div>
    <!-- END APP PAGE -->
