    <!-- SECTION 46: LOGIN PAGE COMPLETE                                   -->
    <!-- ================================================================== -->
    <div id="login-page">

        <!-- ------------------------------------------------------------------
            46.1 Particle Background Container
        ------------------------------------------------------------------ -->
        <div class="particles-bg" id="particles-bg"></div>

        <!-- ------------------------------------------------------------------
            46.2 Login Scene Container (3D Perspective)
        ------------------------------------------------------------------ -->
        <div class="login-scene">

            <!-- ------------------------------------------------------------------
                46.3 Card Wrap (Floating Animation Container)
            ------------------------------------------------------------------ -->
            <div class="card-wrap" id="card-wrap">

                <!-- Neon Border Effect -->
                <div class="neon-border"></div>

                <!-- ------------------------------------------------------------------
                    46.4 Login Card Main Container
                ------------------------------------------------------------------ -->
                <div class="login-card">

                    <!-- ------------------------------------------------------------------
                        46.5 Fold Cover (Opening Animation)
                        On click, triggers openLoginCard() function
                    ------------------------------------------------------------------ -->
                    <div class="fold-cover" id="fold-cover"
                        onclick="document.getElementById('card-wrap').classList.add('open')">
                        <div class="cover-title">
                            <span class="cover-emoji">🏫</span>
                            ECOLE LA FONTAINE
                        </div>
                    </div>

                    <!-- ------------------------------------------------------------------
                        46.6 Login Content (Hidden until card opens)
                    ------------------------------------------------------------------ -->
                    <div class="login-content">

                        <!-- School Logo Box -->
                        <div class="logo-box" id="login-logo-box">
                            <span>🏫</span>
                        </div>

                        <!-- School Name -->
                        <div class="school-name">ECOLE LA FONTAINE</div>
                        <div class="login-subtitle">Complete School Management System</div>

                        <!-- ------------------------------------------------------------------
                            46.7 Login Form
                        ------------------------------------------------------------------ -->
                        <div class="login-form">

                            <!-- Role Selection Dropdown -->
                            <div class="login-field">
                                <select id="login-role" onchange="window.onRoleChange()">
                                    <option value="admin">👨‍💼 Administrator</option>
                                    <option value="accountant">💰 Accountant</option>
                                    <option value="teacher">👩‍🏫 Teacher</option>
                                </select>
                            </div>

                            <!-- Username Field (hidden for admin) -->
                            <div class="login-field" id="username-field" style="display:none">
                                <input type="text" id="login-username" placeholder="Username" autocomplete="username">
                            </div>

                            <!-- Password Field with Toggle Visibility -->
                            <div class="login-field pw-wrap">
                                <input type="password" id="login-password" placeholder="Password"
                                    autocomplete="current-password"
                                    onkeydown="if(event.key==='Enter') window.doLogin()">
                                <button class="pw-toggle" type="button" onclick="window.toggleLoginPw()"
                                    title="Show/hide password">👁️</button>
                            </div>

                            <!-- Biometric Login Button (shown if available) -->
                            <div id="biometric-btn-wrap" style="display:none; margin-top:8px">
                                <button class="login-btn" id="biometric-btn" onclick="window.doBiometricLogin()"
                                    style="background:linear-gradient(135deg,#1a3a5c,#2563eb); display:flex; align-items:center; justify-content:center; gap:8px">
                                    <span>🔑</span> Sign In with Biometrics
                                </button>
                            </div>

                            <!-- Error Alert Container -->
                            <div class="login-alert" id="login-alert" style="display:none"></div>

                            <!-- Submit Button -->
                            <button class="login-btn" id="login-btn" onclick="window.doLogin()">
                                Sign In →
                            </button>

                            <!-- Biometric Setup Link -->
                            <div style="text-align:center; margin-top:8px; font-size:.75rem">
                                <a href="#" onclick="window.setupBiometricLogin(); return false;"
                                    style="color:rgba(255,255,255,.5)">
                                    ⚙️ Set up biometric login
                                </a>
                            </div>

                        </div>
                        <!-- End of Login Form -->

                    </div>
                    <!-- End of Login Content -->

                </div>
                <!-- End of Login Card -->

            </div>
            <!-- End of Card Wrap -->

        </div>
        <!-- End of Login Scene -->

    </div>
    <!-- ================================================================== -->
    <!-- END OF LOGIN PAGE                                                  -->
    <!-- ================================================================== -->


    <!-- ================================================================== -->
