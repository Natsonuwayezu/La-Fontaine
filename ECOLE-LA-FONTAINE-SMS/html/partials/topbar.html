            <header class="topbar">

                <div class="topbar-left">

                        title="Toggle Sidebar Menu">☰</button>
                    <span class="page-title" id="page-title">Dashboard</span>

                <!-- Center Section: Term Progress (optional) -->
                <div class="topbar-center"></div>

                <!-- Right Section: Icons and User Menu -->
                <div class="topbar-right">

                    <!-- Phase Indicator (Pre/Post Midterm) -->
                    <span id="phase-indicator-compact" class="phase-badge-compact"></span>

                    <!-- PWA Install Button (shown when installable) -->
                    <button id="pwa-install-btn" class="btn btn-sm btn-outline" onclick="window.installPWA()"
                        title="Install App" style="display:none">📲 Install</button>

                    <!-- Notifications Bell -->
                    <span class="notif-bell" onclick="window.showNotificationsModal()" title="Notifications">

                        <span class="notif-dot" id="notif-dot" style="display:none;"></span>
                    </span>

                    <!-- User Menu Dropdown Trigger -->
                    <div class="user-menu" onclick="window.toggleUserDropdown()">
                        <div class="user-avatar" id="topbar-avatar">👤</div>
                        <span class="user-name" id="topbar-username">User</span>
                        <span class="user-dropdown-arrow">▾</span>
                    </div>

                </div>

                <!-- ------------------------------------------------------------------
                    50.1 User Dropdown Menu (Hidden by default)
                ------------------------------------------------------------------ -->
                <div class="user-dropdown" id="user-dropdown">

                    <!-- User Info Section -->
                    <div class="dropdown-item dropdown-user-info">
                        <div class="dropdown-avatar">👤</div>
                        <div>
                            <div class="dropdown-user-name" id="dropdown-username">Administrator</div>
                            <div class="dropdown-user-role" id="dropdown-userrole">Admin</div>
                        </div>
                    </div>

                    <div class="dropdown-divider"></div>

                    <!-- Menu Items -->
                    <div class="dropdown-item" onclick="window.showProfileModal()">
                        <span>👤</span> My Profile
                    </div>

                    <div class="dropdown-item" onclick="window.showChangePasswordModal()">
                        <span>🔒</span> Change Password
                    </div>

                    <div class="dropdown-item" onclick="window.setupBiometricLogin()">
                        <span>🔑</span> Biometric Login
                    </div>

                    <div class="dropdown-item" onclick="window.toggleTheme()" id="dropdown-theme-item">
                        <span id="dropdown-theme-icon">🌙</span>
                        <span id="dropdown-theme-text">Dark Mode</span>
                    </div>

                    <div class="dropdown-divider"></div>

                    <div class="dropdown-item danger" onclick="window.logout()">
                        <span>🚪</span> Logout
                    </div>

                </div>
                <!-- End of User Dropdown -->

            </header>
