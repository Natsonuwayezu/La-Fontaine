<!-- templates/receipts/compact-receipt.html -->
<!-- Compact Receipt Template - Small footprint for thermal printers -->
<div class="compact-receipt" id="compact-receipt-template">
    <div class="receipt-line"></div>
    <div class="receipt-header">
        <div class="school-name">{{SCHOOL_NAME}}</div>
        <div class="receipt-title">PAYMENT RECEIPT</div>
        <div class="receipt-number">#{{RECEIPT_NUMBER}}</div>
    </div>
    <div class="receipt-line"></div>

    <div class="receipt-info">
        <div>{{DATE}}</div>
        <div><strong>{{STUDENT_NAME}}</strong></div>
        <div>{{STUDENT_CODE}} | {{CLASS_NAME}}</div>
    </div>
    <div class="receipt-line"></div>

    <div class="payment-details">
        <div>Method: {{PAYMENT_METHOD}}</div>
        <div>Amount: <strong>{{TOTAL_AMOUNT}}</strong></div>
        {{#if REFERENCE}}<div>Ref: {{REFERENCE}}</div>{{/if}}
    </div>
    <div class="receipt-line"></div>

    <div class="fee-items">
        {{FEE_ROWS}}
    </div>
    <div class="receipt-line"></div>

    <div class="footer">
        <div>Thank you for your payment!</div>
        <div>Printed: {{GENERATED_DATE}}</div>
    </div>
    <div class="receipt-line"></div>
</div>

<style>
    .compact-receipt {
        width: 200px;
        margin: 0 auto;
        font-family: 'Courier New', monospace;
        font-size: 9px;
        line-height: 1.3;
        background: white;
    }

    .receipt-line {
        border-top: 1px dashed #000;
        margin: 4px 0;
    }

    .receipt-header {
        text-align: center;
    }

    .school-name {
        font-size: 10px;
        font-weight: bold;
    }

    .receipt-title {
        font-size: 8px;
        font-weight: bold;
    }

    .receipt-number {
        font-size: 8px;
    }

    .receipt-info,
    .payment-details,
    .footer {
        text-align: center;
    }

    .fee-items {
        margin: 4px 0;
    }

    .fee-row {
        display: flex;
        justify-content: space-between;
    }

    @media print {
        .compact-receipt {
            margin: 0;
        }
    }
</style>
