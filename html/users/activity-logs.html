<!-- html/users/activity-logs.html -->
<!-- System Activity Logs Page -->
<div class="activity-logs-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">📋 System Activity Logs</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-outline" onclick="exportActivityLogs()">📥 Export</button>
                <button class="btn btn-sm btn-outline" onclick="clearOldLogs()">🗑️ Clear Old Logs</button>
                <button class="btn btn-sm btn-outline" onclick="refreshLogs()">🔄 Refresh</button>
            </div>
        </div>
        <div class="dash-card-body">
            <div class="filters-bar">
                <select id="log-user-filter" class="form-control" style="width:130px" onchange="filterLogs()">
                    <option value="">All Users</option>
                    <option value="admin">Admin</option>
                    <option value="accountant">Accountant</option>
                    <option value="teacher">Teacher</option>
                </select>
                <select id="log-action-filter" class="form-control" style="width:150px" onchange="filterLogs()">
                    <option value="">All Actions</option>
                    <option value="insert">Created</option>
                    <option value="update">Modified</option>
                    <option value="delete">Deleted</option>
                    <option value="login">Login</option>
                    <option value="logout">Logout</option>
                </select>
                <select id="log-entity-filter" class="form-control" style="width:130px" onchange="filterLogs()">
                    <option value="">All Entities</option>
                    <option value="students">Students</option>
                    <option value="teachers">Teachers</option>
                    <option value="payments">Payments</option>
                    <option value="assessments">Assessments</option>
                    <option value="marks">Marks</option>
                </select>
                <input type="date" id="log-date-start" class="form-control" style="width:140px" onchange="filterLogs()">
                <input type="date" id="log-date-end" class="form-control" style="width:140px" onchange="filterLogs()">
                <input type="text" id="log-search" class="form-control flex-1" placeholder="🔍 Search logs..."
                    oninput="filterLogs()">
                <span class="result-count" id="log-count"></span>
            </div>

            <div class="table-wrapper" id="logs-table-container" style="max-height: 500px; overflow-y: auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>User</th>
                            <th>Role</th>
                            <th>Action</th>
                            <th>Entity Type</th>
                            <th>Entity ID</th>
                            <th>Details</th>
                            <th>IP Address</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody">
                        <tr>
                            <td colspan="8" style="text-align:center;padding:40px">Loading logs...</span>
                </table>
                </tbody>
                </table>
            </div>

            <div class="pagination" id="logs-pagination" style="margin-top:16px"></div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📊 Activity Summary</span>
        </div>
        <div class="dash-card-body">
            <div class="summary-stats" id="activity-summary">
                <div class="stat-card">
                    <div class="stat-value" id="total-actions">0</div>
                    <div class="stat-label">Total Actions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="unique-users">0</div>
                    <div class="stat-label">Active Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="today-actions">0</div>
                    <div class="stat-label">Today's Actions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="most-active-user">—</div>
                    <div class="stat-label">Most Active</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .activity-logs-container {
        animation: fadeIn 0.3s ease;
    }

    .summary-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        .summary-stats {
            grid-template-columns: repeat(2, 1fr);
        }
    }
</style>

<script>
    let currentPage = 1;
    let pageSize = 50;

    function filterLogs() {
        currentPage = 1;
        loadLogs();
    }

    function loadLogs() {
        const tbody = document.getElementById('logs-tbody');
        if (tbody) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px"><div class="spinner"></div> Loading...</span></tr>';
        }
        // Simulate loading
        setTimeout(() => {
            if (tbody) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px">15 records loaded</span></tr>';
            }
        }, 500);
    }

    function exportActivityLogs() {
        alert('Exporting activity logs to Excel');
    }

    function clearOldLogs() {
        if (confirm('Clear logs older than 3 months? This action cannot be undone.')) {
            alert('Old logs cleared');
            loadLogs();
        }
    }

    function refreshLogs() {
        loadLogs();
    }

    // Initial load
    loadLogs();
</script>
