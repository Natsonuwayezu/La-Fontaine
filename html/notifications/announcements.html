<!-- html/notifications/announcements.html -->
<!-- Announcements Management Page (Admin Only) -->
<div class="announcements-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">📢 Announcements Management</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-primary" onclick="openSendAnnouncementModal()">📢 New
                    Announcement</button>
                <button class="btn btn-sm btn-outline" onclick="refreshAnnouncements()">🔄 Refresh</button>
            </div>
        </div>
        <div class="dash-card-body" style="padding:0">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Title</th>
                            <th>Recipients</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Read</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="announcements-tbody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:40px">Loading announcements...</span>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📊 Announcement Statistics</span>
        </div>
        <div class="dash-card-body">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-announcements">0</div>
                    <div class="stat-label">Total Announcements</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sent-announcements">0</div>
                    <div class="stat-label">Sent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="draft-announcements">0</div>
                    <div class="stat-label">Drafts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avg-read-rate">0%</div>
                    <div class="stat-label">Avg Read Rate</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .announcements-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    let announcements = [
        { id: 1, type: 'general', title: 'Welcome Back', recipients: 'All Users', date: '2026-01-10', status: 'sent', readCount: 45, totalRecipients: 50 },
        { id: 2, type: 'urgent', title: 'School Closure', recipients: 'All Users', date: '2026-01-05', status: 'sent', readCount: 48, totalRecipients: 50 },
        { id: 3, type: 'event', title: 'Open Day', recipients: 'Teachers', date: '2026-01-15', status: 'sent', readCount: 12, totalRecipients: 15 }
    ];

    function renderAnnouncements() {
        const tbody = document.getElementById('announcements-tbody');

        document.getElementById('total-announcements').textContent = announcements.length;
        document.getElementById('sent-announcements').textContent = announcements.filter(a => a.status === 'sent').length;
        document.getElementById('draft-announcements').textContent = announcements.filter(a => a.status === 'draft').length;
        const avgReadRate = announcements.reduce((sum, a) => sum + (a.readCount / a.totalRecipients * 100), 0) / announcements.length;
        document.getElementById('avg-read-rate').textContent = avgReadRate.toFixed(1) + '%';

        if (announcements.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px">No announcements found</span></tr>';
            return;
        }

        tbody.innerHTML = announcements.map(a => `
            <tr>
                <td style="text-align:center"><span class="badge ${a.type === 'urgent' ? 'badge-danger' : a.type === 'event' ? 'badge-warning' : 'badge-info'}">${a.type}</span></span>
                <td><strong>${a.title}</strong></span>
                <td>${a.recipients}</span>
                <td>${a.date}</span>
                <td><span class="badge ${a.status === 'sent' ? 'badge-success' : 'badge-neutral'}">${a.status}</span></span>
                <td style="text-align:center">${a.readCount}/${a.totalRecipients}</span>
                <td style="text-align:center">
                    <div class="btn-group" style="gap:4px">
                        <button class="btn btn-sm btn-outline" onclick="viewAnnouncement(${a.id})">👁️</button>
                        <button class="btn btn-sm btn-primary" onclick="editAnnouncement(${a.id})">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteAnnouncement(${a.id})">🗑️</button>
                    </div>
                </span>
            </tr>
        `).join('');
    }

    function openSendAnnouncementModal() {
        const title = prompt('Announcement title:');
        if (!title) return;
        const message = prompt('Announcement message:');
        if (!message) return;
        const type = prompt('Type (general/urgent/event):', 'general');
        const recipients = prompt('Recipients (all/teachers/accountants):', 'all');

        announcements.unshift({
            id: Date.now(),
            type: type,
            title: title,
            recipients: recipients,
            date: new Date().toISOString().split('T')[0],
            status: 'sent',
            readCount: 0,
            totalRecipients: recipients === 'all' ? 50 : recipients === 'teachers' ? 15 : 5
        });
        renderAnnouncements();
        alert('Announcement sent');
    }

    function viewAnnouncement(id) {
        const announcement = announcements.find(a => a.id === id);
        if (announcement) {
            alert(`Title: ${announcement.title}\n\nMessage: Sample message content for ${announcement.title}`);
        }
    }

    function editAnnouncement(id) {
        alert(`Edit announcement ${id}`);
    }

    function deleteAnnouncement(id) {
        if (confirm('Delete this announcement?')) {
            announcements = announcements.filter(a => a.id !== id);
            renderAnnouncements();
            alert('Announcement deleted');
        }
    }

    function refreshAnnouncements() {
        renderAnnouncements();
    }

    // Initial render
    renderAnnouncements();
</script>
