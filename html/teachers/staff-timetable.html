<!-- html/teachers/staff-timetable.html -->
<!-- Staff Timetable Page -->
<div class="staff-timetable-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">🕐 Staff Timetable</span>
            <div class="btn-group">
                <select id="staff-teacher-filter" class="form-control" style="width:200px"
                    onchange="loadStaffTimetable()">
                    <option value="">All Teachers</option>
                    <option value="1">John MUKESA</option>
                    <option value="2">Jane UWIMANA</option>
                    <option value="3">Peter KAGAME</option>
                    <option value="4">Alice MUTESI</option>
                </select>
                <button class="btn btn-sm btn-outline" onclick="exportStaffTimetable()">📥 Export</button>
                <button class="btn btn-sm btn-outline" onclick="printStaffTimetable()">🖨️ Print</button>
            </div>
        </div>
        <div class="dash-card-body" style="padding:0;overflow-x:auto">
            <div id="staff-timetable-container">
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p>Loading timetable...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .staff-timetable-container {
        animation: fadeIn 0.3s ease;
    }

    .teacher-timetable {
        margin-bottom: 32px;
        border: 1px solid var(--border-light);
        border-radius: 12px;
        overflow: hidden;
    }

    .teacher-header {
        background: var(--bg-tertiary);
        padding: 12px 16px;
        font-weight: 700;
        border-bottom: 1px solid var(--border-light);
    }

    .timetable-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
    }

    .timetable-table th,
    .timetable-table td {
        border: 1px solid var(--border-light);
        padding: 8px;
        text-align: center;
    }

    .timetable-table th {
        background: var(--bg-tertiary);
        font-weight: 600;
    }

    .slot-subject {
        font-weight: 600;
        margin-bottom: 4px;
    }

    .slot-class {
        font-size: 10px;
        color: var(--text-muted);
    }

    .break-slot {
        background: var(--bg-tertiary);
        color: var(--text-muted);
        font-style: italic;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    const timeSlots = ['08:20-09:00', '09:00-09:40', '09:40-10:20', '10:40-11:20', '11:20-12:00', '13:00-13:40', '13:40-14:20', '14:20-15:00', '15:20-16:00', '16:00-16:40'];

    function isBreakSlot(slot) {
        return slot === '10:20-10:40' || slot === '12:00-13:00' || slot === '15:00-15:20';
    }

    function getBreakLabel(slot) {
        if (slot === '10:20-10:40') return '🍎 BREAK';
        if (slot === '12:00-13:00') return '🍽️ LUNCH';
        if (slot === '15:00-15:20') return '☕ BREAK';
        return '';
    }

    function loadStaffTimetable() {
        const container = document.getElementById('staff-timetable-container');
        const teacherId = document.getElementById('staff-teacher-filter').value;

        // Sample timetable data
        const timetableHtml = `
            <div class="teacher-timetable">
                <div class="teacher-header">👤 John MUKESA - Mathematics Department</div>
                <div style="overflow-x:auto">
                    <table class="timetable-table">
                        <thead>
                            <tr>
                                <th>Time / Day</th>
                                <th>Monday</th><th>Tuesday</th><th>Wednesday</th><th>Thursday</th><th>Friday</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${timeSlots.map(slot => {
            const isBreak = isBreakSlot(slot);
            const breakLabel = getBreakLabel(slot);
            return `
                                    <tr class="${isBreak ? 'break-slot' : ''}">
                                        <td style="font-weight:600">${slot}<br>${breakLabel ? `<span style="font-size:10px">${breakLabel}</span>` : ''}</td>
                                        ${days.map(day => {
                if (isBreak) {
                    return `<td class="break-slot">${breakLabel === '🍎 BREAK' ? '🍎' : breakLabel === '🍽️ LUNCH' ? '🍽️' : '☕'}</td>`;
                }
                // Sample slots for John
                if (slot === '08:20-09:00' && day === 'Monday') {
                    return `<td><div class="slot-subject">Mathematics</div><div class="slot-class">PRIMARY 4</div><div class="slot-class">📍 Room 101</div></td>`;
                }
                if (slot === '09:00-09:40' && day === 'Monday') {
                    return `<td><div class="slot-subject">Mathematics</div><div class="slot-class">PRIMARY 5</div><div class="slot-class">📍 Room 101</div></td>`;
                }
                if (slot === '08:20-09:00' && day === 'Wednesday') {
                    return `<td><div class="slot-subject">Algebra</div><div class="slot-class">PRIMARY 6</div><div class="slot-class">📍 Room 102</div></td>`;
                }
                return `<td>—</td>`;
            }).join('')}
                                    </tr>
                                `;
        }).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="teacher-timetable" style="margin-top:20px">
                <div class="teacher-header">👤 Jane UWIMANA - English Department</div>
                <div style="overflow-x:auto">
                    <table class="timetable-table">
                        <thead>
                            <tr>
                                <th>Time / Day</th>
                                <th>Monday</th><th>Tuesday</th><th>Wednesday</th><th>Thursday</th><th>Friday</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${timeSlots.map(slot => {
            const isBreak = isBreakSlot(slot);
            const breakLabel = getBreakLabel(slot);
            return `
                                    <tr class="${isBreak ? 'break-slot' : ''}">
                                        <td style="font-weight:600">${slot}<br>${breakLabel ? `<span style="font-size:10px">${breakLabel}</span>` : ''}</td>
                                        ${days.map(day => {
                if (isBreak) {
                    return `<td class="break-slot">${breakLabel === '🍎 BREAK' ? '🍎' : breakLabel === '🍽️ LUNCH' ? '🍽️' : '☕'}</td>`;
                }
                if (slot === '10:40-11:20' && day === 'Tuesday') {
                    return `<td><div class="slot-subject">English Literature</div><div class="slot-class">PRIMARY 4</div><div class="slot-class">📍 Room 103</div></td>`;
                }
                if (slot === '11:20-12:00' && day === 'Thursday') {
                    return `<td><div class="slot-subject">English Grammar</div><div class="slot-class">PRIMARY 5</div><div class="slot-class">📍 Room 103</div></td>`;
                }
                return `<td>—</td>`;
            }).join('')}
                                    </tr>
                                `;
        }).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="teacher-timetable" style="margin-top:20px">
                <div class="teacher-header">👤 Peter KAGAME - Science Department</div>
                <div style="overflow-x:auto">
                    <table class="timetable-table">
                        <thead>
                            <tr>
                                <th>Time / Day</th>
                                <th>Monday</th><th>Tuesday</th><th>Wednesday</th><th>Thursday</th><th>Friday</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${timeSlots.map(slot => {
            const isBreak = isBreakSlot(slot);
            const breakLabel = getBreakLabel(slot);
            return `
                                    <tr class="${isBreak ? 'break-slot' : ''}">
                                        <td style="font-weight:600">${slot}<br>${breakLabel ? `<span style="font-size:10px">${breakLabel}</span>` : ''}</td>
                                        ${days.map(day => {
                if (isBreak) {
                    return `<td class="break-slot">${breakLabel === '🍎 BREAK' ? '🍎' : breakLabel === '🍽️ LUNCH' ? '🍽️' : '☕'}</td>`;
                }
                if (slot === '13:00-13:40' && day === 'Wednesday') {
                    return `<td><div class="slot-subject">Physics</div><div class="slot-class">PRIMARY 5</div><div class="slot-class">📍 Lab 1</div></td>`;
                }
                if (slot === '13:40-14:20' && day === 'Friday') {
                    return `<td><div class="slot-subject">Chemistry</div><div class="slot-class">PRIMARY 6</div><div class="slot-class">📍 Lab 1</div></td>`;
                }
                return `<td>—</td>`;
            }).join('')}
                                    </tr>
                                `;
        }).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        container.innerHTML = timetableHtml;
    }

    function exportStaffTimetable() {
        alert('Exporting staff timetable to Excel');
    }

    function printStaffTimetable() {
        window.print();
    }

    // Load timetable on page load
    loadStaffTimetable();
</script>
