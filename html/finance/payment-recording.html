<!-- html/finance/payment-recording.html -->
<!-- Payment Recording Page -->
<div class="payment-recording-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">💸 RECORD PAYMENT</span><button class="modal-close"
                onclick="navigateTo('payment-history')">✕</button></div>
        <div class="dash-card-body">
            <div class="form-grid" style="margin-bottom:20px">
                <div class="form-group"><label>Student *</label><select class="form-control">
                        <option>John Doe (STU001) - PRIMARY 4</option>
                        <option>Jane Smith (STU002) - PRIMARY 4</option>
                    </select></div>
                <div class="form-group"><label>Class</label><input readonly value="PRIMARY 4" class="form-control">
                </div>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Fee Category</th>
                            <th style="text-align:right">Amount</th>
                            <th style="text-align:right">Paid</th>
                            <th style="text-align:right">Remaining</th>
                            <th>Select</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Tuition Fees</td>
                            <td style="text-align:right">150,000</td>
                            <td style="text-align:right">100,000</td>
                            <td style="text-align:right">50,000</td>
                            <td><input type="checkbox" checked></td>
                        </tr>
                        <tr>
                            <td>Activity Fees</td>
                            <td style="text-align:right">25,000</td>
                            <td style="text-align:right">0</td>
                            <td style="text-align:right">25,000</td>
                            <td><input type="checkbox" checked></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3"><strong>TOTAL SELECTED</strong></td>
                            <td style="text-align:right"><strong>75,000 RWF</strong></td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <div class="form-grid" style="margin-top:20px">
                <div class="form-group"><label>Amount Paid *</label><input type="number" value="75000"
                        class="form-control"></div>
                <div class="form-group"><label>Payment Date *</label><input type="date" value="2026-01-15"
                        class="form-control"></div>
                <div class="form-group"><label>Payment Method</label><select class="form-control">
                        <option>Cash</option>
                        <option>Mobile-Money</option>
                        <option>Bank Transfer</option>
                    </select></div>
                <div class="form-group full"><label>Notes</label><textarea rows="2" class="form-control"></textarea>
                </div>
            </div>
            <div class="btn-group"><button class="btn btn-success">✅ Record Payment</button><button
                    class="btn btn-primary">📄 Record & Print</button></div>
        </div>
    </div>
</div>
