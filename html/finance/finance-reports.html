<!-- html/finance/finance-reports.html -->
<!-- Financial Reports Page -->
<div class="finance-reports-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📊 Financial Reports</span></div>
        <div class="dash-card-body">
            <div class="tabs"><button class="tab-btn active">💰 Collection Report</button><button class="tab-btn">⏳
                    Outstanding</button><button class="tab-btn">🎁 Waivers</button></div>
            <div class="form-grid" style="margin-top:16px">
                <div class="form-group"><label>Date From</label><input type="date" class="form-control"></div>
                <div class="form-group"><label>Date To</label><input type="date" class="form-control"></div>
            </div>
            <button class="btn btn-primary">📊 Generate Report</button>
            <div id="report-preview" class="table-wrapper" style="margin-top:16px">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Receipt #</th>
                            <th>Student</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" style="text-align:center">Generate report to view data</span>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
