<!-- html/settings/academic-years.html -->
<!-- Academic Years Management Page -->
<div class="academic-years-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">📅 Academic Years</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-primary" onclick="openAddYearModal()">➕ Add Academic Year</button>
                <button class="btn btn-sm btn-outline" onclick="exportAcademicYears()">📥 Export</button>
            </div>
        </div>
        <div class="dash-card-body" style="padding:0">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Year Name</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Status</th>
                            <th>Terms</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>2025-2026</strong> <span class="badge badge-success">Active</span></span>
                            <td>2025-01-10</span>
                            <td>2025-12-20</span>
                            <td><span class="badge badge-success">Active</span></span>
                            <td><button class="btn btn-sm btn-outline" onclick="viewTerms(1)">📋 3 Terms</button></span>
                            <td><button class="btn btn-sm btn-outline">✏️</button> <button
                                    class="btn btn-sm btn-danger">🗑️</button></span>
                        </tr>
                        <tr>
                            <td><strong>2026-2027</strong></span>
                            <td>2026-01-10</span>
                            <td>2026-12-20</span>
                            <td><span class="badge badge-neutral">Inactive</span></span>
                            <td><button class="btn btn-sm btn-outline" onclick="viewTerms(2)">📋 3 Terms</button></span>
                            <td><button class="btn btn-sm btn-outline">✏️</button> <button
                                    class="btn btn-sm btn-danger">🗑️</button></span>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="dash-card" style="margin-top:20px">
        <div class="dash-card-header">
            <span class="dash-card-title">📚 Term Details</span>
        </div>
        <div class="dash-card-body" id="terms-container">
            <div class="alert alert-info">Select an academic year to view term details</div>
        </div>
    </div>
</div>

<style>
    .academic-years-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    function openAddYearModal() {
        const yearName = prompt('Enter academic year name (e.g., 2027-2028):');
        if (yearName) {
            alert(`Academic year "${yearName}" created with 3 terms`);
        }
    }

    function viewTerms(yearId) {
        const container = document.getElementById('terms-container');
        container.innerHTML = `
            <div class="form-grid">
                <div class="form-group">
                    <label>Term 1 Start</label>
                    <input type="date" class="form-control" value="2026-01-10">
                </div>
                <div class="form-group">
                    <label>Term 1 End</label>
                    <input type="date" class="form-control" value="2026-03-20">
                </div>
                <div class="form-group">
                    <label>Term 2 Start</label>
                    <input type="date" class="form-control" value="2026-04-10">
                </div>
                <div class="form-group">
                    <label>Term 2 End</label>
                    <input type="date" class="form-control" value="2026-06-20">
                </div>
                <div class="form-group">
                    <label>Term 3 Start</label>
                    <input type="date" class="form-control" value="2026-09-10">
                </div>
                <div class="form-group">
                    <label>Term 3 End</label>
                    <input type="date" class="form-control" value="2026-11-20">
                </div>
            </div>
            <div class="btn-group" style="margin-top:16px">
                <button class="btn btn-primary" onclick="saveTerms()">💾 Save Terms</button>
            </div>
        `;
    }

    function saveTerms() {
        alert('Term dates saved');
    }

    function exportAcademicYears() {
        alert('Exporting academic years to Excel');
    }
</script>
