<!-- html/academics/statistics.html -->
<!-- Statistics Page -->
<div class="statistics-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📈 STATISTICS</span><button
                class="btn btn-sm btn-outline">📤 Export</button></div>
        <div class="dash-card-body">
            <div class="filters-bar"><select class="form-control">
                    <option>By Class</option>
                    <option>Annual Comparison</option>
                    <option>Grade Distribution</option>
                </select><select class="form-control">
                    <option>All Classes</option>
                </select><select class="form-control">
                    <option>All Terms</option>
                </select></div>
            <div class="two-col">
                <div class="dash-card">
                    <div class="dash-card-header">📊 PERFORMANCE OVERVIEW</div>
                    <div class="dash-card-body"><canvas id="stats-chart" height="200"
                            style="background:var(--bg-tertiary)"></canvas></div>
                </div>
                <div class="dash-card">
                    <div class="dash-card-header">📋 CLASS PERFORMANCE</div>
                    <div class="dash-card-body">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Class</th>
                                    <th>Students</th>
                                    <th>Avg %</th>
                                    <th>Grade</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>PRIMARY 4</td>
                                    <td>25</td>
                                    <td>81.5%</td>
                                    <td>A</td>
                                </tr>
                                <tr>
                                    <td>PRIMARY 5</td>
                                    <td>22</td>
                                    <td>76.2%</td>
                                    <td>B</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
