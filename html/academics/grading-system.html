<!-- html/academics/grading-system.html -->
<!-- Grading System Page -->
<div class="grading-system-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📊 Grading Scale</span><button
                class="btn btn-sm btn-success">💾 Save</button></div>
        <div class="dash-card-body">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Grade</th>
                            <th>Min %</th>
                            <th>Max %</th>
                            <th>Description</th>
                            <th>Color</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input value="A+" class="form-control" style="width:70px"></td>
                            <td><input type="number" value="90" style="width:70px"></td>
                            <td><input type="number" value="100" style="width:70px"></td>
                            <td><input value="Excellent" style="width:120px"></td>
                            <td><input type="color" value="#d1fae5" style="width:50px"></td>
                            <td><button class="btn btn-sm btn-danger">🗑️</button></td>
                        </tr>
                        <tr>
                            <td><input value="A" class="form-control" style="width:70px"></td>
                            <td><input type="number" value="80" style="width:70px"></td>
                            <td><input type="number" value="89" style="width:70px"></td>
                            <td><input value="Very Good" style="width:120px"></td>
                            <td><input type="color" value="#d1fae5" style="width:50px"></td>
                            <td><button class="btn btn-sm btn-danger">🗑️</button></td>
                        </tr>
                        <tr>
                            <td><input value="B" class="form-control" style="width:70px"></td>
                            <td><input type="number" value="70" style="width:70px"></td>
                            <td><input type="number" value="79" style="width:70px"></td>
                            <td><input value="Good" style="width:120px"></td>
                            <td><input type="color" value="#fef3c7" style="width:50px"></td>
                            <td><button class="btn btn-sm btn-danger">🗑️</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button class="btn btn-sm btn-outline" style="margin-top:16px">➕ Add Grade Level</button>
        </div>
    </div>
</div>
