<!-- html/academics/marks-entry.html -->
<!-- Marks Entry Page -->
<div class="marks-entry-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">✏️ MARKS ENTRY</span>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span class="phase-badge phase-post">📝 POST-MIDTERM PHASE</span>
                <button class="btn btn-sm btn-outline" onclick="showExistingAssessments()">📋 Existing</button>
            </div>
        </div>
        <div class="dash-card-body">
            <div
                style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;align-items:end">
                <div class="form-group"><label>Class *</label><select id="me-class" class="form-control">
                        <option>PRIMARY 4</option>
                        <option>PRIMARY 5</option>
                    </select></div>
                <div class="form-group"><label>Subject *</label><select id="me-subject" class="form-control">
                        <option>Mathematics</option>
                        <option>English</option>
                        <option>Science</option>
                    </select></div>
                <div class="form-group"><label>Type *</label><select id="me-type" class="form-control">
                        <option>Quiz</option>
                        <option>Assignment</option>
                        <option>Mid-term</option>
                        <option>Exam</option>
                    </select></div>
                <div class="form-group"><label>Name *</label><input type="text" placeholder="e.g. Quiz 3"
                        class="form-control"></div>
                <div class="form-group"><label>Max Marks</label><input type="number" value="50" class="form-control">
                </div>
                <div class="form-group"><label>Date</label><input type="date" class="form-control"></div>
            </div>
            <div style="margin-top:12px"><label><input type="checkbox"> Lock after saving</label><button
                    class="btn btn-primary" style="margin-left:16px">📋 Load Students</button></div>
        </div>
    </div>
    <div class="dash-card" style="display:none">
        <div class="dash-card-header"><span class="dash-card-title">📝 Student Marks</span><span
                class="me-summary"></span></div>
        <div class="dash-card-body" style="padding:0">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student Name</th>
                            <th>Score</th>
                            <th>/ Max</th>
                            <th>% Grade</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" style="text-align:center">Load students to enter marks</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="btn-group" style="padding:12px"><button class="btn btn-success">💾 Save to DB</button><button
                    class="btn btn-outline">📤 Import Excel</button><button class="btn btn-outline">📥 Export
                    Excel</button></div>
        </div>
    </div>
</div>
<script>function showExistingAssessments() { alert('Existing assessments modal'); }</script>
