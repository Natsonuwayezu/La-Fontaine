<!-- Timetable Page -->
<div class="timetable-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">🕐 Timetable</span><select id="tt-view-type"
                class="form-control" style="width:140px">
                <option>Class View</option>
                <option>Teacher View</option>
            </select>
            <select id="tt-class-filter" class="form-control" style="width:160px">
                <option>PRIMARY 4</option>
                <option>PRIMARY 5</option>
            </select><button class="btn btn-sm btn-outline">📥 Export</button><button class="btn btn-sm btn-outline">🖨️
                Print</button>
        </div>
        <div class="dash-card-body">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Time / Day</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>08:20-09:00</td>
                            <td>Mathematics</td>
                            <td>English</td>
                            <td>Science</td>
                            <td>Mathematics</td>
                            <td>English</td>
                        </tr>
                        <tr>
                            <td>09:00-09:40</td>
                            <td>English</td>
                            <td>Mathematics</td>
                            <td>English</td>
                            <td>Science</td>
                            <td>Mathematics</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
