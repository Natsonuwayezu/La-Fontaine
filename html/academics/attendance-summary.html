<!-- html/academics/attendance-summary.html -->
<!-- Attendance Summary Page -->
<div class="attendance-summary-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📊 Attendance Summary</span><button
                class="btn btn-sm btn-outline">📥 Export</button></div>
        <div class="dash-card-body">
            <div class="filters-bar"><select>
                    <option>PRIMARY 4</option>
                </select><select>
                    <option>Term 3</option>
                </select></div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">92%</div>
                    <div class="stat-label">Overall Attendance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">18</div>
                    <div class="stat-label">School Days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">2</div>
                    <div class="stat-label">Absent Days</div>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Present</th>
                            <th>Absent</th>
                            <th>Late</th>
                            <th>Rate</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>John Doe</td>
                            <td>16</td>
                            <td>1</td>
                            <td>1</td>
                            <td>88.9%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
