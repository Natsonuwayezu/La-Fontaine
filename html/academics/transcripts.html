<!-- Transcripts Page -->
<div class="transcripts-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📜 Academic Transcripts</span></div>
        <div class="dash-card-body">
            <div class="form-grid">
                <div class="form-group"><label>Student</label><select>
                        <option>John Doe</option>
                        <option>Jane Smith</option>
                    </select></div>
                <div class="form-group"><label>From Year</label><select>
                        <option>2023-2024</option>
                        <option>2024-2025</option>
                        <option>2025-2026</option>
                    </select></div>
                <div class="form-group"><label>To Year</label><select>
                        <option>2025-2026</option>
                        <option>2026-2027</option>
                    </select></div>
            </div>
            <div class="btn-group"><button class="btn btn-primary">📜 Generate Transcript</button><button
                    class="btn btn-outline">📥 PDF</button></div>
        </div>
    </div>
</div>
