<!-- html/academics/academic-calendar.html -->
<!-- Academic Calendar Page -->
<div class="academic-calendar-container">
    <div class="dash-card">
        <div class="dash-card-header"><span class="dash-card-title">📅 Academic Calendar</span><button
                class="btn btn-sm btn-primary">➕ Add New Year</button></div>
        <div class="dash-card-body">
            <div style="margin-bottom:24px">
                <h4>📅 TERM DATES</h4>
                <div style="border:1px solid var(--border-light);border-radius:8px;padding:16px;margin-bottom:16px">
                    <strong>Term 3</strong><span class="badge badge-warning" style="margin-left:8px">🟡 In
                        Progress</span>
                    <div class="form-grid" style="margin-top:12px">
                        <div class="form-group"><label>Start Date</label><input type="date" value="2026-01-10"
                                class="form-control"></div>
                        <div class="form-group"><label>End Date</label><input type="date" value="2026-03-20"
                                class="form-control"></div>
                        <div class="form-group"><label>Midterm Date</label><input type="date" value="2026-02-15"
                                class="form-control"></div>
                    </div>
                    <button class="btn btn-sm btn-primary">Save</button>
                </div>
            </div>
            <div>
                <h4>🏖️ HOLIDAYS & BREAKS</h4><button class="btn btn-sm btn-primary">➕ Add Holiday</button><button
                    class="btn btn-sm btn-outline">🇷🇼 Import RW Holidays</button>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Holiday Name</th>
                                <th>Start Date</th>
                                <th>End Date</th>
                                <th>Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>New Year's Day</td>
                                <td>2026-01-01</td>
                                <td>2026-01-01</td>
                                <td>Public Holiday</td>
                                <td><button class="btn btn-sm btn-outline">✏️</button><button
                                        class="btn btn-sm btn-danger">🗑️</button></td>
                            </tr>
                            <tr>
                                <td>Genocide Memorial</td>
                                <td>2026-04-07</td>
                                <td>2026-04-07</td>
                                <td>Public Holiday</td>
                                <td><button class="btn btn-sm btn-outline">✏️</button><button
                                        class="btn btn-sm btn-danger">🗑️</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
