<!-- html/students/student-fees.html -->
<!-- Student Fees Page -->
<div class="student-fees-container">
    <div class="dash-card">
        <div class="dash-card-header">
            <span class="dash-card-title">💰 Student Fee Balances</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-outline" onclick="exportBalances()">📥 Export</button>
            </div>
        </div>
        <div class="dash-card-body">
            <div class="filters-bar">
                <select id="stf-class" class="form-control" style="width:180px" onchange="renderTable()">
                    <option value="">All Classes</option>
                    <option value="1">NURSERY 1</option>
                    <option value="2">NURSERY 2</option>
                    <option value="3">NURSERY 3</option>
                    <option value="4">PRIMARY 1</option>
                    <option value="5">PRIMARY 2</option>
                    <option value="6">PRIMARY 3</option>
                    <option value="7">PRIMARY 4</option>
                    <option value="8">PRIMARY 5</option>
                    <option value="9">PRIMARY 6</option>
                </select>
                <input type="text" id="stf-search" class="form-control flex-1" placeholder="🔍 Search student..."
                    oninput="renderTable()">
                <span class="result-count" id="stf-count"></span>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Class</th>
                            <th>Total Fees</th>
                            <th>Paid</th>
                            <th>Balance</th>
                            <th>%</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stf-tbody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:40px">Loading...</span>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .student-fees-container {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    let feeData = [
        { id: 1, name: 'John Doe', class: 'PRIMARY 4', code: 'STU001', total: 225000, paid: 150000, balance: 75000, pct: 66.7 },
        { id: 2, name: 'Jane Smith', class: 'PRIMARY 4', code: 'STU002', total: 225000, paid: 225000, balance: 0, pct: 100 },
        { id: 3, name: 'Peter Kagame', class: 'PRIMARY 5', code: 'STU003', total: 225000, paid: 50000, balance: 175000, pct: 22.2 }
    ];

    function renderTable() {
        const tbody = document.getElementById('stf-tbody');

        if (feeData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px">No students found</span></tr>';
            return;
        }

        tbody.innerHTML = feeData.map(s => `
            <tr>
                <td><strong>${s.name}</strong><br><small>${s.code}</small></td>
                <td>${s.class}</td>
                <td>${s.total.toLocaleString()} RWF</td>
                <td>${s.paid.toLocaleString()} RWF</td>
                <td class="${s.balance > 0 ? 'text-danger' : ''}">${s.balance.toLocaleString()} RWF</td>
                <td><span class="badge ${s.pct >= 100 ? 'badge-success' : s.pct >= 50 ? 'badge-warning' : 'badge-danger'}">${s.pct}%</span></td>
                <td>
                    <div class="btn-group" style="gap:4px">
                        <button class="btn btn-sm btn-primary" onclick="recordPayment(${s.id})">💰 Pay</button>
                        <button class="btn btn-sm btn-outline" onclick="adjustBalance(${s.id})">⚙️ Adjust</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function recordPayment(id) {
        alert(`Record payment for student ${id}`);
    }

    function adjustBalance(id) {
        alert(`Adjust balance for student ${id}`);
    }

    function exportBalances() {
        alert('Exporting balances to Excel');
    }

    renderTable();
</script>
